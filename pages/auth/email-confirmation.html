<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Трамплин · Подтверждение регистрации</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles/shared/style.css?v=20260320-auth7" />
    <link rel="stylesheet" href="../../styles/auth/auth-register.css?v=20260320-auth-confirm-figma1" />
  </head>
  <body class="auth-body">
    <main class="auth-layout">
      <section class="auth-stage auth-stage--confirm" aria-labelledby="confirmation-title">
        <div class="auth-stage__backdrop" aria-hidden="true"></div>
        <div class="auth-stage__media auth-stage__media--left" aria-hidden="true"></div>
        <div class="auth-stage__media auth-stage__media--right" aria-hidden="true"></div>

        <div class="auth-flow auth-flow--single">
          <article class="auth-panel auth-panel--confirm" data-auth-screen="confirm">
            <div class="auth-panel__top">
              <a
                class="auth-back"
                href="candidate-registration.html"
                aria-label="Вернуться назад"
                data-confirm-back
              >
                <span aria-hidden="true">←</span>
              </a>

              <div class="auth-brand" aria-label="TRAMPLIN">
                <span class="auth-brand__mark" aria-hidden="true"></span>
                <span class="auth-brand__label">TRAMPLIN</span>
              </div>
            </div>

            <div class="auth-panel__copy auth-panel__copy--confirm">
              <h1 id="confirmation-title" data-confirm-title>Подтверждение регистрации</h1>
              <p data-confirm-copy>
                Введите код подтверждения, отправленный на почту.
              </p>
            </div>

            <form class="auth-form auth-form--confirm" action="../candidate/candidate-dashboard.html" data-confirm-form>
              <div class="auth-confirm-code" role="group" aria-label="Код подтверждения">
                <label class="sr-only" for="confirm-digit-1">Первая цифра кода</label>
                <input
                  class="auth-confirm-code__input"
                  id="confirm-digit-1"
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  maxlength="1"
                  autocomplete="one-time-code"
                  required
                />

                <label class="sr-only" for="confirm-digit-2">Вторая цифра кода</label>
                <input
                  class="auth-confirm-code__input"
                  id="confirm-digit-2"
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  maxlength="1"
                  required
                />

                <label class="sr-only" for="confirm-digit-3">Третья цифра кода</label>
                <input
                  class="auth-confirm-code__input"
                  id="confirm-digit-3"
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  maxlength="1"
                  required
                />

                <label class="sr-only" for="confirm-digit-4">Четвёртая цифра кода</label>
                <input
                  class="auth-confirm-code__input"
                  id="confirm-digit-4"
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  maxlength="1"
                  required
                />
              </div>

              <div class="auth-message auth-message--error" data-form-message hidden></div>

              <button
                class="auth-button auth-button--primary auth-button--large"
                type="submit"
                data-submit-button
                data-confirm-submit
                data-loading-label="Проверяем код"
              >
                <span class="auth-button__label">Завершить регистрацию</span>
                <span class="auth-button__loader" aria-hidden="true"></span>
              </button>
            </form>
          </article>
        </div>
      </section>
    </main>

    <script src="../../scripts/auth/auth-screens.js?v=20260320-auth-confirm-figma1"></script>
  </body>
</html>
