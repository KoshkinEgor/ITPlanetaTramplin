<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Трамплин · Регистрация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles/shared/style.css?v=20260320-auth7" />
    <link rel="stylesheet" href="../../styles/auth/auth-register.css?v=20260320-auth-system1" />
  </head>
  <body>
    <main class="entry-register">
      <article class="auth-panel entry-register__panel" data-auth-screen="register">
        <div class="auth-panel__top">
          <a class="auth-back" href="login.html" aria-label="Вернуться ко входу">
            <span aria-hidden="true">←</span>
          </a>

          <div class="auth-brand" aria-label="TRAMPLIN">
            <span class="auth-brand__mark" aria-hidden="true"></span>
            <span class="auth-brand__label">TRAMPLIN</span>
          </div>
        </div>

        <div class="auth-panel__copy entry-register__copy">
          <h1 id="register-title">Регистрация</h1>
          <p>Выберите роль для регистрации</p>
        </div>

        <form
          class="auth-form entry-register__form"
          action="email-confirmation.html"
          method="get"
          novalidate
          data-register-form
        >
          <input type="hidden" name="role" value="candidate" data-role-value />

          <div class="auth-role-list auth-role-list--stacked" role="radiogroup" aria-label="Выбор роли">
            <label class="auth-role-card auth-role-card--compact is-selected" data-role-card>
              <input type="radio" name="register-role" value="candidate" checked />
              <span
                class="auth-role-card__icon auth-role-card__icon--candidate"
                aria-hidden="true"
              ></span>
              <span class="auth-role-card__text">
                <strong>Я ищу работу</strong>
                <span>Профиль соискателя, вакансии и отклики</span>
              </span>
            </label>

            <label class="auth-role-card auth-role-card--compact" data-role-card>
              <input type="radio" name="register-role" value="employer" />
              <span
                class="auth-role-card__icon auth-role-card__icon--employer"
                aria-hidden="true"
              ></span>
              <span class="auth-role-card__text">
                <strong>Я ищу сотрудников</strong>
                <span>Профиль работодателя, вакансии и подбор</span>
              </span>
            </label>
          </div>

          <div class="auth-form-grid auth-form-grid--stacked" data-register-fields>
            <label class="auth-field" data-register-slot="primary">
              <span class="auth-field__label" data-register-label>Email</span>
              <input
                class="auth-input"
                id="register-email"
                type="email"
                name="email"
                placeholder="name@company.ru"
                autocomplete="email"
                data-validate="email"
                data-register-input
                data-error-message="Введите корректный email"
              />
              <span class="auth-field__error" data-error-for="email" hidden></span>
            </label>

            <label class="auth-field" data-register-slot="secondary">
              <span class="auth-field__label">Имя</span>
              <input
                class="auth-input"
                id="register-display-name"
                type="text"
                name="displayName"
                placeholder="Как к вам обращаться"
                autocomplete="name"
                data-validate="text"
                data-min-length="2"
                data-error-message="Введите имя"
              />
              <span class="auth-field__error" data-error-for="displayName" hidden></span>
            </label>

            <label class="auth-field" data-register-slot="password">
              <span class="auth-field__label">Пароль</span>
              <div class="auth-input-wrap">
                <input
                  class="auth-input"
                  id="register-password"
                  type="password"
                  name="password"
                  placeholder="Минимум 8 символов"
                  autocomplete="new-password"
                  data-validate="password"
                  data-min-length="8"
                  data-error-message="Пароль должен содержать минимум 8 символов"
                />
                <button
                  class="auth-input-action"
                  type="button"
                  data-password-toggle
                  data-target="register-password"
                  aria-label="Показать пароль"
                >
                  Показать
                </button>
              </div>
              <span class="auth-field__error" data-error-for="password" hidden></span>
            </label>
          </div>

          <div class="auth-message auth-message--error entry-register__message" data-form-message hidden></div>

          <div class="auth-form-actions auth-form-actions--compact">
            <button
              class="auth-button auth-button--primary auth-button--large entry-register__submit"
              type="submit"
              data-submit-button
              data-loading-label="Регистрируем"
            >
              <span class="auth-button__label">Зарегистрироваться</span>
              <span class="auth-button__loader" aria-hidden="true"></span>
            </button>
          </div>
        </form>
      </article>
    </main>

    <script src="../../scripts/auth/auth-screens.js?v=20260320-auth-system1"></script>
    <script src="../../scripts/auth/register-role-fields.js?v=20260320-company-role"></script>
  </body>
</html>
